<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#0f1419;font-family:'Inter',system-ui,sans-serif;
  touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;overscroll-behavior:none;}
#game-wrapper{position:fixed;inset:0;width:100vw;height:100vh;}

/* ─── splash ─── */
#splash{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,#1a2330 0%,#0a0e14 100%);transition:opacity .4s;padding:1rem;}
.splash-card{text-align:center;padding:1.5rem;max-width:380px;width:100%;}
.logo{font-size:2.4rem;font-weight:700;color:#e8a35c;letter-spacing:-.02em;margin-bottom:.2rem;line-height:1;}
.logo span{color:#5a8a4f;}
.tag{color:#7a8590;font-size:.82rem;margin-bottom:1.4rem;font-weight:400;}
.hi-line{color:#e8a35c;font-size:.78rem;font-weight:600;margin-bottom:1.3rem;letter-spacing:.02em;
  padding:.6rem .8rem;background:rgba(232,163,92,.08);border:1px solid rgba(232,163,92,.18);border-radius:8px;}
.hi-line span{color:#fff;font-weight:700;}
#nameIn{width:100%;padding:.85rem 1rem;border:1.5px solid #2a3340;border-radius:10px;
  background:#141a22;color:#fff;font-family:inherit;font-size:1rem;text-align:center;outline:none;transition:border .15s;}
#nameIn:focus{border-color:#5a8a4f;}
#nameIn::placeholder{color:#4a5560;}
#playBtn{width:100%;margin-top:.7rem;padding:.95rem;border:none;border-radius:10px;
  background:#e8a35c;color:#0f1419;font-family:inherit;font-size:1.05rem;font-weight:700;cursor:pointer;
  transition:transform .12s,background .15s;letter-spacing:.01em;}
#playBtn:active{transform:scale(.97);background:#d89348;}
.cause{margin-top:1.3rem;font-size:.7rem;color:#5a6570;line-height:1.5;}
.cause a{color:#5a8a4f;text-decoration:none;font-weight:600;}

.controls-hint{margin-top:.9rem;font-size:.68rem;color:#4a5560;}

/* ─── orientation lock overlay ─── */
#orient{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;
  background:#0a0e14;color:#e8a35c;text-align:center;padding:2rem;}
#orient.show{display:flex;}
.orient-inner{max-width:300px;}
.orient-icon{font-size:3.5rem;margin-bottom:1rem;animation:rot 2s ease-in-out infinite;display:inline-block;}
@keyframes rot{0%,100%{transform:rotate(0)}50%{transform:rotate(-90deg)}}
.orient-inner h2{font-size:1.2rem;margin-bottom:.5rem;font-weight:600;color:#fff;}
.orient-inner p{color:#7a8590;font-size:.85rem;line-height:1.5;}

/* ─── fullscreen toggle ─── */
#fsBtn{position:fixed;top:8px;right:8px;z-index:50;background:rgba(0,0,0,.4);color:#fff;
  border:none;border-radius:6px;padding:6px 10px;font-size:.7rem;cursor:pointer;display:none;font-family:inherit;}
#fsBtn.show{display:block;}
</style>

<script>
/* ═══════════════════════════════════════════════════════════════
   GLOBALS
   ═══════════════════════════════════════════════════════════════ */
const SHEET_URL='https://script.google.com/macros/s/AKfycbzPFFLo3mlmKZahdFkPa8-8rdO2GkSYQaLuL_N1zBwLpf6L9LRX4QtS6hYrksmeRNlS5w/exec';
let playerName='', leaderboardEntries=[], globalHigh=0, topScore=0, topScoreName='';
let audioCtx=null, muted=false;

/* ─── leaderboard ─── */
async function fetchLB(){
  try{
    const r=await fetch(SHEET_URL+'?t='+Date.now(),{cache:'no-store'});
    if(!r.ok) return;
    const d=await r.json();
    leaderboardEntries=Array.isArray(d.top)?d.top.slice(0,5):[];
    if(leaderboardEntries[0]){
      topScore=leaderboardEntries[0].score||0;
      topScoreName=leaderboardEntries[0].name||'';
    }
    if(playerName){
      const me=(d.all||[]).find(x=>x.name===playerName);
      if(me) globalHigh=me.score;
    }
    const el=document.getElementById('hiScore');
    if(el) el.textContent=topScore?(topScore+(topScoreName?' · '+topScoreName:'')):'—';
  }catch(e){}
}
async function submitScore(s){
  if(!playerName||s<=0) return;
  try{await fetch(SHEET_URL,{method:'POST',body:new URLSearchParams({name:playerName,score:String(s)})}); fetchLB();}catch(e){}
}

/* ─── audio ─── */
function ensureAudio(){if(!audioCtx&&!muted)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function resumeAudio(){if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume().catch(()=>{});}
function sfx(type){
  if(muted) return; ensureAudio(); if(!audioCtx) return; resumeAudio();
  try{
    const n=audioCtx.currentTime, o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    if(type==='cross'){o.frequency.value=720; o.type='sine';}
    else if(type==='hit'){o.frequency.value=80;  o.type='sawtooth';}
    else if(type==='level'){o.frequency.value=520; o.type='triangle';}
    g.gain.setValueAtTime(.001,n);
    g.gain.exponentialRampToValueAtTime(.12,n+.01);
    g.gain.exponentialRampToValueAtTime(.0001,n+.25);
    o.start(n); o.stop(n+.3);
    o.onended=()=>{o.disconnect(); g.disconnect();};
  }catch(e){audioCtx=null;}
}
function vibrate(p){if(navigator.vibrate&&!muted) try{navigator.vibrate(p);}catch(e){}}

/* ─── fullscreen ─── */
function goFullscreen(){
  const el=document.documentElement;
  const req=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen;
  if(req) try{ req.call(el).catch(()=>{}); }catch(e){}
  if(screen.orientation&&screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
}
function isFullscreen(){return !!(document.fullscreenElement||document.webkitFullscreenElement);}

/* ─── orientation ─── */
function isMobile(){return window.matchMedia('(max-width:1024px)').matches&&('ontouchstart' in window);}
function checkOrient(){
  const portrait=window.innerHeight>window.innerWidth;
  const need=isMobile()&&portrait;
  document.getElementById('orient').classList.toggle('show',need);
  if(!need&&window._game) window._game.scale.refresh();
}
window.addEventListener('resize',checkOrient);
window.addEventListener('orientationchange',()=>setTimeout(checkOrient,150));

/* ─── splash wiring ─── */
const splash=document.getElementById('splash');
const nameIn=document.getElementById('nameIn');
const playBtn=document.getElementById('playBtn');
const fsBtn=document.getElementById('fsBtn');

fetchLB();
checkOrient();
nameIn.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();playBtn.click();}});
nameIn.addEventListener('input',()=>{playerName=nameIn.value.trim();});

playBtn.addEventListener('click',()=>{
  playerName=nameIn.value.trim()||playerName||'Anon';
  ensureAudio(); resumeAudio();
  goFullscreen();
  splash.style.opacity='0'; splash.style.pointerEvents='none';
  fsBtn.classList.add('show');
  if(window._game) window._game.scene.getScene('Game').scene.restart();
  else launchGame();
  gtag('event','start_game',{event_category:'Game'});
});
fsBtn.addEventListener('click',()=>{ if(isFullscreen()) document.exitFullscreen?.(); else goFullscreen(); });

/* ═══════════════════════════════════════════════════════════════
   TEXTURE BUILDERS — minimal, top-down, realistic-ish
   ═══════════════════════════════════════════════════════════════ */

/* California newt (Taricha torosa): dark olive-brown back, bright
   orange ventral peeking along sides. Top-down, simple flat shapes. */
function makeNewt(sc,key,w,h){
  const g=sc.make.graphics({add:false});
  const cx=w*.5;

  /* ground shadow */
  g.fillStyle(0x000000,.25);
  g.fillEllipse(cx,h*.93,w*.55,h*.06);

  /* tail */
  g.fillStyle(0x3a2a1a);
  g.fillEllipse(cx,h*.84,w*.16,h*.22);
  g.fillStyle(0x2a1d11);
  g.fillEllipse(cx,h*.93,w*.09,h*.1);

  /* legs — small dark nubs */
  g.fillStyle(0x2a1d11);
  g.fillEllipse(w*.18,h*.4 ,w*.16,h*.07);
  g.fillEllipse(w*.82,h*.4 ,w*.16,h*.07);
  g.fillEllipse(w*.2 ,h*.66,w*.16,h*.07);
  g.fillEllipse(w*.8 ,h*.66,w*.16,h*.07);

  /* body — dark olive-brown */
  g.fillStyle(0x2c2113);
  g.fillEllipse(cx,h*.55,w*.62,h*.55);

  /* orange ventral hint along flanks */
  g.fillStyle(0xd4651f,.85);
  g.fillEllipse(w*.21,h*.55,w*.07,h*.32);
  g.fillEllipse(w*.79,h*.55,w*.07,h*.32);

  /* darker dorsal centerline */
  g.fillStyle(0x18100a,.55);
  g.fillEllipse(cx,h*.55,w*.07,h*.45);

  /* head */
  g.fillStyle(0x2c2113);
  g.fillEllipse(cx,h*.22,w*.42,h*.26);

  /* tiny eyes */
  g.fillStyle(0x000000);
  g.fillCircle(w*.4 ,h*.18,w*.035);
  g.fillCircle(w*.6 ,h*.18,w*.035);
  g.fillStyle(0xffffff,.7);
  g.fillCircle(w*.395,h*.172,w*.012);
  g.fillCircle(w*.595,h*.172,w*.012);

  g.generateTexture(key,w,h); g.destroy();
}

/* splat — minimal stain */
function makeSplat(sc,key,r){
  const s=r*2.4, g=sc.make.graphics({add:false});
  g.fillStyle(0x4a2a14,.7);
  g.fillEllipse(s*.5,s*.5,r*1.6,r*1.1);
  g.fillStyle(0x2a1808,.6);
  g.fillEllipse(s*.5,s*.5,r,r*.7);
  g.generateTexture(key,s,s); g.destroy();
}

/* ─── color helpers ─── */
function darken(hex,a){
  const c=Phaser.Display.Color.HexStringToColor(hex);
  return Phaser.Display.Color.GetColor(Math.max(0,c.r*(1-a)|0),Math.max(0,c.g*(1-a)|0),Math.max(0,c.b*(1-a)|0));
}
function lighten(hex,a){
  const c=Phaser.Display.Color.HexStringToColor(hex);
  return Phaser.Display.Color.GetColor(
    Math.min(255,c.r+(255-c.r)*a|0),
    Math.min(255,c.g+(255-c.g)*a|0),
    Math.min(255,c.b+(255-c.b)*a|0));
}
function hexNum(h){return parseInt(h.replace('#',''),16);}

/* realistic muted vehicle colors */
const VEHICLE_COLORS=['#2c3e50','#7f8c8d','#34495e','#922b21','#1f4e79','#1e6b3e','#5d4037','#222222','#bdc3c7'];

/* === SEDAN — top-down view, vehicle pointing LEFT (flipped if dir>0) === */
function makeSedan(sc,key,w,h,col){
  const g=sc.make.graphics({add:false}), cn=hexNum(col);
  /* shadow */
  g.fillStyle(0x000000,.28);
  g.fillRoundedRect(w*.04,h*.1,w*.92,h*.86,h*.18);
  /* body */
  g.fillStyle(cn);
  g.fillRoundedRect(w*.06,h*.06,w*.88,h*.88,h*.18);
  /* hood/trunk seams */
  g.fillStyle(darken(col,.3),.55);
  g.fillRect(w*.08,h*.3,w*.84,1.5);
  g.fillRect(w*.08,h*.7,w*.84,1.5);
  /* windows (front + rear) */
  g.fillStyle(0x1a2530,.85);
  g.fillRoundedRect(w*.12,h*.32,w*.76,h*.16,4);
  g.fillRoundedRect(w*.12,h*.52,w*.76,h*.16,4);
  /* roof */
  g.fillStyle(lighten(col,.06));
  g.fillRoundedRect(w*.14,h*.34,w*.72,h*.32,h*.06);
  /* mirrors */
  g.fillStyle(darken(col,.22));
  g.fillRect(w*.04,h*.42,w*.04,h*.04);
  g.fillRect(w*.04,h*.54,w*.04,h*.04);
  g.fillRect(w*.92,h*.42,w*.04,h*.04);
  g.fillRect(w*.92,h*.54,w*.04,h*.04);
  /* headlights — front (left side) */
  g.fillStyle(0xfff4cc);
  g.fillRoundedRect(w*.07,h*.13,w*.06,h*.08,2);
  g.fillRoundedRect(w*.07,h*.79,w*.06,h*.08,2);
  /* taillights — rear */
  g.fillStyle(0xc0392b);
  g.fillRoundedRect(w*.87,h*.13,w*.06,h*.08,2);
  g.fillRoundedRect(w*.87,h*.79,w*.06,h*.08,2);
  /* highlight */
  g.fillStyle(0xffffff,.05);
  g.fillRoundedRect(w*.1,h*.08,w*.8,h*.04,2);
  g.generateTexture(key,w,h); g.destroy();
}

/* === SUV === */
function makeSUV(sc,key,w,h,col){
  const g=sc.make.graphics({add:false}), cn=hexNum(col);
  g.fillStyle(0x000000,.28);
  g.fillRoundedRect(w*.04,h*.1,w*.92,h*.86,h*.1);
  g.fillStyle(cn);
  g.fillRoundedRect(w*.05,h*.05,w*.9,h*.9,h*.1);
  /* tall roof / cabin */
  g.fillStyle(lighten(col,.06));
  g.fillRoundedRect(w*.1,h*.22,w*.8,h*.56,h*.05);
  /* windows */
  g.fillStyle(0x1a2530,.85);
  g.fillRoundedRect(w*.13,h*.25,w*.74,h*.13,3);
  g.fillRoundedRect(w*.13,h*.62,w*.74,h*.13,3);
  /* mirrors */
  g.fillStyle(darken(col,.22));
  g.fillRect(w*.03,h*.38,w*.04,h*.05);
  g.fillRect(w*.03,h*.57,w*.04,h*.05);
  g.fillRect(w*.93,h*.38,w*.04,h*.05);
  g.fillRect(w*.93,h*.57,w*.04,h*.05);
  /* lights */
  g.fillStyle(0xfff4cc);
  g.fillRoundedRect(w*.06,h*.12,w*.06,h*.1,2);
  g.fillRoundedRect(w*.06,h*.78,w*.06,h*.1,2);
  g.fillStyle(0xc0392b);
  g.fillRoundedRect(w*.88,h*.12,w*.06,h*.1,2);
  g.fillRoundedRect(w*.88,h*.78,w*.06,h*.1,2);
  /* roof rails */
  g.fillStyle(darken(col,.32),.7);
  g.fillRect(w*.12,h*.2,w*.76,2);
  g.fillRect(w*.12,h*.78,w*.76,2);
  g.generateTexture(key,w,h); g.destroy();
}

/* === TRUCK / pickup === */
function makeTruck(sc,key,w,h,col){
  const g=sc.make.graphics({add:false}), cn=hexNum(col);
  g.fillStyle(0x000000,.28);
  g.fillRoundedRect(w*.03,h*.1,w*.94,h*.86,h*.08);
  /* cab (front) */
  g.fillStyle(cn);
  g.fillRoundedRect(w*.04,h*.06,w*.34,h*.88,h*.08);
  /* bed (rear) — different shade */
  g.fillStyle(darken(col,.22));
  g.fillRoundedRect(w*.36,h*.1,w*.6,h*.8,h*.04);
  /* bed rails */
  g.fillStyle(darken(col,.4));
  g.fillRect(w*.36,h*.1,w*.6,3);
  g.fillRect(w*.36,h*.87,w*.6,3);
  g.fillRect(w*.93,h*.1,3,h*.8);
  /* cab windows */
  g.fillStyle(0x1a2530,.85);
  g.fillRoundedRect(w*.08,h*.2,w*.26,h*.16,3);
  g.fillRoundedRect(w*.08,h*.64,w*.26,h*.16,3);
  /* lights */
  g.fillStyle(0xfff4cc);
  g.fillRoundedRect(w*.05,h*.12,w*.05,h*.08,2);
  g.fillRoundedRect(w*.05,h*.8,w*.05,h*.08,2);
  g.fillStyle(0xc0392b);
  g.fillRoundedRect(w*.9,h*.12,w*.05,h*.08,2);
  g.fillRoundedRect(w*.9,h*.8,w*.05,h*.08,2);
  /* mirrors */
  g.fillStyle(darken(col,.28));
  g.fillRect(w*.02,h*.32,w*.04,h*.05);
  g.fillRect(w*.02,h*.63,w*.04,h*.05);
  g.generateTexture(key,w,h); g.destroy();
}

/* === MOTORCYCLE — narrow, fast === */
function makeMotorcycle(sc,key,w,h){
  const g=sc.make.graphics({add:false});
  /* shadow */
  g.fillStyle(0x000000,.25);
  g.fillEllipse(w*.5,h*.6,w*.85,h*.5);
  /* tires (front/rear stripes) */
  g.fillStyle(0x111);
  g.fillRoundedRect(w*.06,h*.34,w*.14,h*.32,3);
  g.fillRoundedRect(w*.8 ,h*.34,w*.14,h*.32,3);
  /* body / fairing */
  g.fillStyle(0x2c2c2c);
  g.fillRoundedRect(w*.22,h*.3,w*.56,h*.4,h*.15);
  /* tank */
  g.fillStyle(0x444);
  g.fillRoundedRect(w*.42,h*.36,w*.16,h*.28,h*.08);
  /* helmet (rider top-down) */
  g.fillStyle(0x1f1f1f);
  g.fillCircle(w*.5,h*.5,h*.18);
  g.fillStyle(0x0a0a0a);
  g.fillCircle(w*.5,h*.5,h*.12);
  /* headlight */
  g.fillStyle(0xfff4cc);
  g.fillCircle(w*.09,h*.5,h*.06);
  /* taillight */
  g.fillStyle(0xc0392b);
  g.fillCircle(w*.91,h*.5,h*.05);
  g.generateTexture(key,w,h); g.destroy();
}

/* ═══════════════════════════════════════════════════════════════
   GAME SCENE
   ═══════════════════════════════════════════════════════════════ */
class GameScene extends Phaser.Scene {
  constructor(){ super('Game'); }

  create(){
    const W=this.scale.width, H=this.scale.height;
    /* tile size — based on smaller dim so it works in any aspect ratio */
    const TS=Math.max(28,Math.min(W,H)/11);
    this.TS=TS;

    /* layout */
    this.ROAD_TOP   = H*.26;
    this.ROAD_BOT   = H*.74;
    this.ROAD_MID   = (this.ROAD_TOP+this.ROAD_BOT)/2;
    this.SHOULDER_H = TS*.7;
    this.SPAWN_Y    = H-TS*1.0;

    /* state */
    this.score=0; this.lives=3; this.isOver=false;
    this.newtAlive=true; this.targetAng=0; this.lastStep=0;
    this.invulnerable=false;
    this.diff=1;

    /* textures */
    const nw=Math.round(TS*.95), nh=Math.round(TS*1.35);
    if(!this.textures.exists('newt'))  makeNewt(this,'newt',nw,nh);
    if(!this.textures.exists('splat')) makeSplat(this,'splat',Math.round(TS*.55));

    /* vehicle textures */
    this.vehPool=[];
    const vTypes=[
      {name:'sedan', fn:makeSedan, wm:2.5, hm:1.25, spd:1.0,  weight:5},
      {name:'suv'  , fn:makeSUV  , wm:2.8, hm:1.45, spd:.9 ,  weight:3},
      {name:'truck', fn:makeTruck, wm:3.5, hm:1.5 , spd:.75,  weight:2},
      {name:'moto' , fn:makeMotorcycle, wm:1.6, hm:.9, spd:1.45, weight:2}
    ];
    vTypes.forEach(vt=>{
      const vw=Math.round(TS*vt.wm), vh=Math.round(TS*vt.hm);
      if(vt.name==='moto'){
        const k=vt.name+'_0';
        if(!this.textures.exists(k)) vt.fn(this,k,vw,vh);
        for(let n=0;n<vt.weight;n++) this.vehPool.push({key:k,spdMul:vt.spd});
      } else {
        VEHICLE_COLORS.forEach((col,i)=>{
          const k=vt.name+'_'+i;
          if(!this.textures.exists(k)) vt.fn(this,k,vw,vh,col);
          for(let n=0;n<vt.weight;n++) this.vehPool.push({key:k,spdMul:vt.spd});
        });
      }
    });

    /* ── background — flat minimal bands ── */
    const bg=this.add.graphics().setDepth(-10);
    /* upper grass (safe zone) */
    bg.fillStyle(0x3a5a3a); bg.fillRect(0,0,W,this.ROAD_TOP-this.SHOULDER_H);
    /* dirt shoulder top */
    bg.fillStyle(0x5a4a35); bg.fillRect(0,this.ROAD_TOP-this.SHOULDER_H,W,this.SHOULDER_H);
    /* asphalt */
    bg.fillStyle(0x2a2d33); bg.fillRect(0,this.ROAD_TOP,W,this.ROAD_BOT-this.ROAD_TOP);
    /* asphalt subtle texture */
    for(let i=0;i<50;i++){
      bg.fillStyle(0x35383e,.4);
      bg.fillRect(Math.random()*W,this.ROAD_TOP+Math.random()*(this.ROAD_BOT-this.ROAD_TOP),Math.random()*3,1);
    }
    /* edge lines */
    bg.fillStyle(0xeeeeee,.7); bg.fillRect(0,this.ROAD_TOP+2,W,2);
    bg.fillStyle(0xeeeeee,.7); bg.fillRect(0,this.ROAD_BOT-4,W,2);
    /* shoulder bottom */
    bg.fillStyle(0x5a4a35); bg.fillRect(0,this.ROAD_BOT,W,this.SHOULDER_H);
    /* lower grass */
    bg.fillStyle(0x3a5a3a); bg.fillRect(0,this.ROAD_BOT+this.SHOULDER_H,W,H-this.ROAD_BOT-this.SHOULDER_H);

    /* sparse grass tufts */
    for(let i=0;i<28;i++){
      bg.fillStyle(0x2a4a2a,.5);
      const y=Math.random()<.5
        ? Math.random()*(this.ROAD_TOP-this.SHOULDER_H)
        : this.ROAD_BOT+this.SHOULDER_H+Math.random()*(H-this.ROAD_BOT-this.SHOULDER_H);
      bg.fillCircle(Math.random()*W,y,1+Math.random()*1.5);
    }

    /* dashed centre line */
    this.dashGfx=this.add.graphics().setDepth(-4);

    /* SAFE label */
    this.add.text(W/2,this.ROAD_TOP-this.SHOULDER_H-TS*.32,'SAFE',
      {fontFamily:'Inter',fontSize:Math.max(10,TS*.28)+'px',fontStyle:'600',color:'#5a8a4f'})
      .setOrigin(.5).setDepth(-3).setAlpha(.7);

    /* ── lanes — adapt to road height ── */
    const roadH=this.ROAD_BOT-this.ROAD_TOP;
    const laneCount=Math.max(2,Math.floor(roadH/(TS*1.4)));
    this.lanes=[];
    const laneH=roadH/laneCount;
    for(let i=0;i<laneCount;i++){
      this.lanes.push({
        y:this.ROAD_TOP+laneH*(i+.5),
        dir:i%2===0?-1:1
      });
    }

    /* vehicles */
    this.vehicles=this.physics.add.group();
    this.spawnCars();

    /* player newt */
    this.newt=this.physics.add.image(W/2,this.SPAWN_Y,'newt').setDepth(5);
    this.newt.body.setAllowGravity(false);
    this.newt.setCollideWorldBounds(true);
    this.newt.body.setSize(nw*.55,nh*.55);

    /* HUD top bar */
    const fs=Math.max(13,TS*.4);
    const hudStyle={fontFamily:'Inter',fontSize:fs+'px',fontStyle:'600',color:'#fff'};
    this.add.rectangle(0,0,W,fs*1.9,0x000000,.45).setOrigin(0,0).setDepth(10);
    this.scoreTxt=this.add.text(TS*.4,fs*.5,'Score  0',hudStyle).setDepth(11);
    this.livesTxt=this.add.text(W-TS*.4,fs*.5,'',hudStyle).setOrigin(1,0).setDepth(11);
    this.bestTxt =this.add.text(W/2,fs*.5,'',{...hudStyle,color:'#e8a35c'}).setOrigin(.5,0).setDepth(11);
    this.updateHUD();

    /* mute button */
    const muteSize=Math.max(16,TS*.5);
    this.muteBt=this.add.text(TS*.4,fs*2.2,muted?'🔇':'🔊',
      {fontSize:muteSize+'px'}).setDepth(11).setInteractive({useHandCursor:true});
    this.muteBt.on('pointerdown',e=>{
      if(e&&e.event){e.event.stopPropagation();}
      muted=!muted; this.muteBt.setText(muted?'🔇':'🔊');
    });

    /* game over container */
    this.goContainer=this.add.container(0,0).setDepth(30).setVisible(false);

    /* input — keyboard */
    this.input.keyboard.on('keydown-UP',   ()=>this.step(0,-1));
    this.input.keyboard.on('keydown-DOWN', ()=>this.step(0, 1));
    this.input.keyboard.on('keydown-LEFT', ()=>this.step(-1,0));
    this.input.keyboard.on('keydown-RIGHT',()=>this.step( 1,0));
    this.input.keyboard.on('keydown-W',    ()=>this.step(0,-1));
    this.input.keyboard.on('keydown-S',    ()=>this.step(0, 1));
    this.input.keyboard.on('keydown-A',    ()=>this.step(-1,0));
    this.input.keyboard.on('keydown-D',    ()=>this.step( 1,0));
    this.input.keyboard.on('keydown-ENTER',()=>{if(this.isOver)this.scene.restart();});

    /* input — touch / pointer */
    let sx=0,sy=0,st=0,muteHit=false;
    this.input.on('pointerdown',p=>{
      /* ignore taps on the mute button area */
      muteHit = p.x<TS*1.0 && p.y<TS*3.2 && p.y>fs*1.9;
      if(this.isOver){this.scene.restart(); return;}
      sx=p.x; sy=p.y; st=this.time.now;
    });
    this.input.on('pointerup',p=>{
      if(this.isOver||muteHit) return;
      const dx=p.x-sx, dy=p.y-sy, dist=Math.sqrt(dx*dx+dy*dy);
      const SWIPE=Math.max(15,this.TS*.35);
      if(dist>SWIPE){
        if(Math.abs(dx)>Math.abs(dy)) this.step(dx>0?1:-1,0);
        else this.step(0,dy>0?1:-1);
      } else if(this.time.now-st<350){
        if(!this.newtAlive) return;
        const ndx=p.x-this.newt.x, ndy=p.y-this.newt.y;
        if(Math.abs(ndx)>Math.abs(ndy)) this.step(ndx>0?1:-1,0);
        else this.step(0,ndy>0?1:-1);
      }
    });

    /* baseline difficulty drift */
    this.time.addEvent({delay:30000,loop:true,callback:()=>{
      if(!this.isOver) this.diff=Math.min(3.5,this.diff+.08);
    }});
  }

  /* ── HUD update ── */
  updateHUD(){
    if(this.scoreTxt) this.scoreTxt.setText('Score  '+this.score);
    if(this.livesTxt) this.livesTxt.setText('♥ '.repeat(Math.max(0,this.lives)).trim());
    if(this.bestTxt)  this.bestTxt.setText(topScore?('Best  '+topScore):'');
  }

  /* ── movement ── */
  step(dx,dy){
    if(!this.newtAlive||this.isOver) return;
    const now=this.time.now;
    if(now-this.lastStep<85) return;
    this.lastStep=now;
    const TS=this.TS, W=this.scale.width, H=this.scale.height;
    let nx=Phaser.Math.Clamp(this.newt.x+dx*TS,TS*.6,W-TS*.6);
    let ny=Phaser.Math.Clamp(this.newt.y+dy*TS,TS,H-TS*.6);
    if(dy>0&&ny>this.SPAWN_Y+TS*.3) ny=this.newt.y;
    if(dy<0) this.targetAng=0;
    else if(dy>0) this.targetAng=180;
    else if(dx<0) this.targetAng=-90;
    else if(dx>0) this.targetAng=90;
    this.tweens.add({targets:this.newt,x:nx,y:ny,duration:80,ease:'Power2'});
  }

  /* ── spawn vehicles ── */
  spawnCars(){
    this.vehicles.clear(true,true);
    const W=this.scale.width, TS=this.TS;
    this.lanes.forEach(lane=>{
      const laneBaseSpd=.7+Math.random()*.4;
      const count=Phaser.Math.Between(2,4);
      const minGap=TS*4;
      let cursor=Phaser.Math.Between(0,Math.round(TS*2));
      for(let i=0;i<count;i++){
        const entry=Phaser.Utils.Array.GetRandom(this.vehPool);
        const texW=this.textures.get(entry.key).getSourceImage().width;
        const v=this.physics.add.image(cursor,lane.y,entry.key).setDepth(2);
        v.body.setAllowGravity(false);
        v.dir=lane.dir;
        v.baseSpd=laneBaseSpd*entry.spdMul;
        v.spd=v.baseSpd;
        /* sprite is drawn pointing left (front on left side); flip if traveling right */
        v.setFlipX(lane.dir>0);
        this.vehicles.add(v);
        cursor+=texW+minGap+Phaser.Math.Between(0,Math.round(TS*2));
      }
    });
  }

  /* ── collision ── */
  onHit(){
    if(!this.newtAlive||this.invulnerable) return;
    sfx('hit'); vibrate([40,30,80]);
    this.cameras.main.shake(180,.012);
    this.cameras.main.flash(160,255,60,60);
    const sp=this.add.image(this.newt.x,this.newt.y,'splat').setDepth(1).setAlpha(.85);
    this.tweens.add({targets:sp,alpha:0,duration:8000,onComplete:()=>sp.destroy()});
    this.newtAlive=false;
    this.tweens.killTweensOf(this.newt);
    this.newt.setVisible(false);
    this.lives--;
    this.updateHUD();
    if(this.lives<=0){
      this.isOver=true;
      submitScore(this.score);
      gtag('event','game_over',{event_category:'Game',value:this.score});
      this.time.delayedCall(450,()=>this.showGameOver());
    } else {
      this.time.delayedCall(500,()=>this.resetNewt());
    }
  }

  /* ── crossed ── */
  onCross(){
    this.score++;
    sfx('cross'); vibrate(15);
    this.cameras.main.flash(80,90,180,90,true);
    const ft=this.add.text(this.newt.x,this.newt.y,'+1',
      {fontFamily:'Inter',fontSize:this.TS*.6+'px',fontStyle:'700',color:'#5a8a4f'}).setOrigin(.5).setDepth(15);
    this.tweens.add({targets:ft,y:ft.y-this.TS*1.4,alpha:0,duration:600,ease:'Power2',onComplete:()=>ft.destroy()});

    /* difficulty scales with score */
    this.diff=Math.min(3.5,1+this.score*0.07);
    if(this.score%3===0){ sfx('level'); this.spawnCars(); }
    this.updateHUD();
    this.resetNewt();
    gtag('event','newt_crossed',{event_category:'Game',value:this.score});
  }

  /* ── reset newt ── */
  resetNewt(){
    const W=this.scale.width;
    this.tweens.killTweensOf(this.newt);
    this.newt.setPosition(W/2,this.SPAWN_Y).setVisible(true).setAlpha(1).setScale(1);
    this.newt.angle=0; this.targetAng=0; this.newtAlive=true;
    this.invulnerable=true;
    this.tweens.add({
      targets:this.newt, alpha:{from:.4,to:1}, duration:90, repeat:5, yoyo:true,
      onComplete:()=>{this.newt.setAlpha(1); this.invulnerable=false;}
    });
  }

  /* ── game over screen with leaderboard ── */
  showGameOver(){
    const W=this.scale.width,H=this.scale.height,TS=this.TS,c=this.goContainer;
    c.removeAll(true);
    c.add(this.add.rectangle(W/2,H/2,W,H,0x0a0e14,.92));

    c.add(this.add.text(W/2,H*.1,'GAME OVER',
      {fontFamily:'Inter',fontSize:Math.max(22,TS*1.1)+'px',fontStyle:'700',color:'#e8a35c'}).setOrigin(.5));
    c.add(this.add.text(W/2,H*.2,'Score  '+this.score,
      {fontFamily:'Inter',fontSize:Math.max(18,TS*.75)+'px',fontStyle:'600',color:'#fff'}).setOrigin(.5));

    if(playerName){
      c.add(this.add.text(W/2,H*.28,`${playerName} · best ${Math.max(globalHigh,this.score)}`,
        {fontFamily:'Inter',fontSize:Math.max(11,TS*.34)+'px',color:'#7a8590'}).setOrigin(.5));
    }

    c.add(this.add.text(W/2,H*.38,'TOP SCORES',
      {fontFamily:'Inter',fontSize:Math.max(11,TS*.34)+'px',fontStyle:'600',color:'#5a8a4f'}).setOrigin(.5));

    if(leaderboardEntries.length){
      leaderboardEntries.forEach((e,i)=>{
        c.add(this.add.text(W/2,H*.44+i*TS*.55,
          `${i+1}.  ${e.name}   ${e.score}`,
          {fontFamily:'Inter',fontSize:Math.max(13,TS*.4)+'px',color:i===0?'#e8a35c':'#ddd'}
        ).setOrigin(.5));
      });
    } else {
      c.add(this.add.text(W/2,H*.48,'No scores yet',
        {fontFamily:'Inter',fontSize:Math.max(12,TS*.38)+'px',color:'#7a8590'}).setOrigin(.5));
    }

    const ry=Math.min(H*.44+leaderboardEntries.length*TS*.55+TS*1.2,H*.86);
    const rt=this.add.text(W/2,ry,'TAP TO PLAY AGAIN',
      {fontFamily:'Inter',fontSize:Math.max(13,TS*.42)+'px',fontStyle:'700',color:'#fff'}).setOrigin(.5);
    this.tweens.add({targets:rt,alpha:{from:1,to:.4},duration:700,yoyo:true,repeat:-1});
    c.add(rt);

    c.add(this.add.text(W/2,H*.95,'bioblitz.club/newts',
      {fontFamily:'Inter',fontSize:Math.max(10,TS*.28)+'px',color:'#5a8a4f'}).setOrigin(.5));

    c.setVisible(true).setAlpha(0);
    this.tweens.add({targets:c,alpha:1,duration:350});
  }

  /* ─────────────────────────────────────────────────────────
     UPDATE
     ───────────────────────────────────────────────────────── */
  update(time,delta){
    if(this.isOver) return;
    const W=this.scale.width, H=this.scale.height, TS=this.TS, dt=delta/1000;

    /* newt rotation */
    if(this.newtAlive&&this.newt){
      let ta=this.targetAng, ca=this.newt.angle, d=ta-ca;
      if(d>180) d-=360; if(d<-180) d+=360;
      this.newt.angle+=d*.22;
    }

    /* move vehicles with following behavior */
    const baseSpd=W*.085;
    const vehs=this.vehicles.children.getArray();
    vehs.forEach(v=>{ if(v&&v.active) v.spd=v.baseSpd; });
    vehs.forEach(v=>{
      if(!v||!v.active) return;
      const minFollow=TS*2.4;
      let nearestDist=Infinity;
      const wrapW=W+v.width*2;
      vehs.forEach(o=>{
        if(!o||!o.active||o===v) return;
        if(Math.abs(o.y-v.y)>TS*.6) return;
        let gap=v.dir>0?(o.x-v.x):(v.x-o.x);
        gap=((gap%wrapW)+wrapW)%wrapW;
        if(gap>0&&gap<nearestDist) nearestDist=gap;
      });
      if(nearestDist<minFollow){
        v.spd=v.baseSpd*Math.max(.18,nearestDist/minFollow);
      }
      v.x+=v.dir*baseSpd*v.spd*this.diff*dt;
      if(v.dir>0&&v.x>W+v.width) v.x=-v.width;
      else if(v.dir<0&&v.x<-v.width) v.x=W+v.width;
    });

    /* dashed centre line */
    this.dashGfx.clear();
    if(this.lanes.length>1){
      this.dashGfx.lineStyle(2,0xffd24a,.55);
      const dl=TS*.7, gl=TS*.7, td=dl+gl, off=(time*.05)%td;
      const midY=this.ROAD_MID;
      for(let x=-off;x<W;x+=td) this.dashGfx.lineBetween(x,midY,x+dl,midY);
    }

    /* success check FIRST */
    if(this.newtAlive&&this.newt&&this.newt.y<this.ROAD_TOP-this.SHOULDER_H*.5){
      this.onCross();
      return;
    }

    /* collision check */
    if(this.newtAlive&&this.newt&&!this.invulnerable){
      const nb=this.newt.getBounds();
      const m=TS*.2;
      const nR=new Phaser.Geom.Rectangle(nb.x+m,nb.y+m,nb.width-m*2,nb.height-m*2);
      let hit=false;
      this.vehicles.children.iterate(v=>{
        if(!v||!v.active||hit) return;
        if(Phaser.Geom.Rectangle.Overlaps(nR,v.getBounds())) hit=true;
      });
      if(hit) this.onHit();
    }
  }
}

/* ═══════════════════════════════════════════════════════════════
   LAUNCH
   ═══════════════════════════════════════════════════════════════ */
function launchGame(){
  window._game=new Phaser.Game({
    type:Phaser.AUTO,
    parent:'game-wrapper',
    width:window.innerWidth,
    height:window.innerHeight,
    backgroundColor:'#0f1419',
    physics:{default:'arcade',arcade:{debug:false,gravity:{y:0}}},
    scale:{mode:Phaser.Scale.RESIZE,autoCenter:Phaser.Scale.CENTER_BOTH},
    scene:[GameScene],
    fps:{target:60,forceSetTimeOut:false},
    input:{activePointers:2}
  });
}
</script>
